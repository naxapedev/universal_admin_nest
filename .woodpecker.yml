when:
  - event: push
    branch: main

steps:
  - name: deploy
    image: docker:24-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/abdulwahid/naxape:/home/abdulwahid/naxape
      - /var/lib/woodpecker:/var/lib/woodpecker
    commands:
      - echo "=== Woodpecker Deploy ==="
      - cp /home/abdulwahid/naxape/apps/universal_admin_nest/.env . || true
      # Build and deploy, removing old orphaned containers automatically
      - docker compose -p universal_backend up -d --build --remove-orphans
      
