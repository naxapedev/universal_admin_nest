version: '3.8'

services:
  backend:
    build:
      # Uses the pipeline workspace path when running in CI, falls back to '.' locally
      context: ${CI_WORKSPACE:-.}
      dockerfile: Dockerfile

    container_name: universal_nestjs_backend

    ports:
      - "4001:4001"

    env_file:
      - .env

    restart: unless-stopped
